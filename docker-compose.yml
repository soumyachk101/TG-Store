services:
  db:
    image: postgres:16-alpine
    container_name: tgstore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tgstore
      POSTGRES_PASSWORD: tgstore
      POSTGRES_DB: tgstore
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgstore -d tgstore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
